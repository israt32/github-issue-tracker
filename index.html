<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- font awsome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--  google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <!-- daisi and tailwind  -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- navbar -->

    <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <a class="flex items-center gap-2 text-2xl font-semibold text-[#1F2937]"><span><img class="w-9" src="./assets/github-logo.png" alt=""></span>GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2 items-center">
    <input type="text" id="search" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="">
       <button class="font-semibold bg-[#4A00FF] text-white px-4 py-2 rounded"><i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i> New Issue</button>
     
     
    </div>
  </div>
</div>


    <!-- main section -->
    <div class="section"></div>
     <div class="">
      <button class="filter-btn" value="all">All</button>
      <button class="filter-btn" value="open">Open</button>
      <button class="filter-btn" value="closed">Closed</button>
     </div>
     <div>
      <h1 id="counter"></h1>
      <h2>Track and manage your project issues</h2>
     </div>
     <div class="parent-card">

     </div>


     <!-- modal -->
      <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" >open modal</button> -->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <!-- <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p> -->
   
    <div class="modal-span-div">

    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

    <script src="./issues.js"></script>
  </body>
</html>
