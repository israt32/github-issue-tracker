<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!--  google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <!-- daisi and tailwind  -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- style css -->
     <style>
      *{
        font-family: "Geist", sans-serif;
      }
      .error{
        font-size: 14px;
        display: none;
        text-align: center;
        color: red;
      }
     </style>
</head>
<body class="container mx-auto px-6">
  <div class=" md:w-[520px] mx-auto p-8 ">
    <div class="text-center mb-6">
      <img src="./assets/github-logo.png" alt="" class="mx-auto mb-6">
      <h1 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h1>
      <p class="text-[#64748B] text-[1rem]">Sign in to manage your issues</p>
    </div>
    <form id="loginForm">
      <p class="error" id="error-message">Invalid Username or password</p>
       <label class="text-[#1F2937] font-medium" for="username">Username</label>
      <input class="block p-4 rounded-lg w-full" type="text" id="username" placeholder="Enter Username" required>
      <p class="text-[#4A00FF] text-[14px] mb-4">Default: admin</p>
        <label class="text-[#1F2937] font-medium" for="password">Password</label>
      <input class="block p-4 rounded-lg w-full" type="password" id="password" placeholder="Password" required>
      <p class="text-[#4A00FF] text-[14px] mb-6">Default: admin123</p>
      <button class="bg-[#4A00FF] w-full p-4 rounded-lg text-[16px] font-semibold text-white" type="submit">Sign in</button>
    </form>
  </div>

  <script src="./login.js"></script>
</body>
</html>
